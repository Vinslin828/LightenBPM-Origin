    "DeploymentType=staging",
    "AWSCachingOptimized=658327ea-f89d-4fab-a63d-7e88639e58f6",
    "DomainName=bpm.staging.lightencycling.com",
    "ACMCertificate=arn:aws:acm:us-east-1:519993345904:certificate/19e74f68-756e-4b0d-91b3-85003066e649"
]
image_repositories = []

[uat.deploy.parameters]
