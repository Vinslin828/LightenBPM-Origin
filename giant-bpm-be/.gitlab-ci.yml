# PRE-MIGRATION STAGE
# =============================================================================

.pre_migration_template:
  stage: pre_migration
  tags:
    - docker
  image:
    name: public.ecr.aws/aws-cli/aws-cli:latest
    entrypoint: ["/bin/sh", "-c"]
  id_tokens:
    GITLAB_OIDC_TOKEN:
      aud: sts.amazonaws.com
  before_script:
    # Load environment variables from file
    - source $ENV
    # Assume AWS role via OIDC
    - export $(aws sts assume-role-with-web-identity --role-arn "${AWS_ROLE_ARN}" --role-session-name "gitlab-${CI_PROJECT_NAME}-${CI_PIPELINE_ID}" --web-identity-token "${GITLAB_OIDC_TOKEN}" --duration-seconds 3600 --query 'Credentials.[AccessKeyId,SecretAccessKey,SessionToken]' --output text | awk '{printf "AWS_ACCESS_KEY_ID=%s AWS_SECRET_ACCESS_KEY=%s AWS_SESSION_TOKEN=%s", $1, $2, $3}')
  script:
    - |
      echo "🔄 Running database pre-migration..."
      chmod +x infrastructure/scripts/run-pre-migration.sh
      ./infrastructure/scripts/run-pre-migration.sh
      echo "✅ Pre-migration completed!"

pre_migration_dev:
  extends:
    - .pre_migration_template
  variables:
    STAGE: dev
  environment:
    name: dev
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - prisma/migrations/**/*
        - prisma/schema.prisma
        - infrastructure/scripts/run-pre-migration.sh
      when: on_success
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual
      allow_failure: true

pre_migration_staging:
  extends:
    - .pre_migration_template
